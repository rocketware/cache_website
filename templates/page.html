{% extends "base.html" %}

{% block title %}{{ page.title }} - {{ config.title }}{% endblock %}
{% block description %}{{ page.description | default(value=config.description) }}{% endblock %}

{% block content %}
<article class="page-content" style="max-width: 800px; margin: 0 auto; padding: 2rem 1rem;">
  {{ page.content | safe }}
</article>
{% endblock %}
