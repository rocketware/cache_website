License</h1><p class=license-subtitle>Choose a plan, configure it, and complete your purchase via Stripe.<div class=currency-picker><select aria-label=Currency id=currency-select></select></div><div class=license-error id=cancelled-banner style=display:none>Payment was cancelled. You can try again below.</div><div class=license-purchase-form><div class=purchase-step><h2>1. Choose a plan</h2><div class=plan-options><label class=plan-option><input checked name=plan type=radio value=personal> <div class=plan-option-content><strong>Personal</strong><span class=plan-tagline>For individuals and families</span><span class=plan-price id=plan-price-personal></span></div></label><label class=plan-option><input name=plan type=radio value=business> <div class=plan-option-content><strong>Business</strong><span class=plan-tagline>For organisations</span><span class=plan-price id=plan-price-business></span></div></label></div></div><div class=purchase-step id=config-step><h2>2. Configure</h2><div id=quantity-config><label for=quantity-input id=quantity-label></label><input class=quantity-input id=quantity-input max=20 min=1 type=number value=1></div></div><div class=purchase-step><h2>3. Billing period</h2><div class=billing-options><label class=billing-option><input name=billing type=radio value=monthly> <span>Monthly</span></label><label class=billing-option><input checked name=billing type=radio value=annual> <span>Annual</span> <span class=annual-savings id=annual-savings-badge></span></label></div></div><div class=purchase-step><div class=price-summary id=price-summary></div></div><div class=purchase-step style=text-align:center><button class="btn btn-primary btn-large" id=purchase-btn onclick=handlePurchase()>Purchase</button><div class=license-error id=purchase-error style=display:none></div><div class=license-loading id=purchase-loading style=display:none>Redirecting to checkout...</div></div></div></div></section><script>const CONFIG = {"currencies":{"default":"usd","eur":{"label":"EUR","position":"prefix","symbol":"€"},"gbp":{"label":"GBP","position":"prefix","symbol":"£"},"supported":["usd","gbp","eur"],"usd":{"label":"USD","position":"prefix","symbol":"$"}},"domains":{"license_server":"https://api.cachenotes.app","website":"https://www.cachenotes.app"},"plans":{"business":{"annual_id":"price_1T3GvtHBjuEfyzFqnZXattf4","display_name":"Business","max":100,"min":1,"monthly_id":"price_1T2TykHBjuEfyzFqA2RVNIvu","pricing_model":"graduated","product_id":"prod_U0UyX2cX4kl5gD","tagline":"For organisations","tiers":[{"annual":{"eur":40,"gbp":36,"usd":45},"monthly":{"eur":4.0,"gbp":3.75,"usd":4.5},"up_to":10},{"annual":{"eur":27,"gbp":24,"usd":30},"monthly":{"eur":2.75,"gbp":2.5,"usd":3.0}}],"unit":"seat","units":"seats"},"personal":{"annual_id":"price_1T3GqyHBjuEfyzFqAjSSC3jU","display_name":"Personal","max":5,"min":1,"monthly_id":"price_1T2WuWHBjuEfyzFqERbpfJ23","pricing_model":"graduated","product_id":"prod_U0UhEwEmWvVOUh","tagline":"For individuals and families","tiers":[{"annual":{"eur":27,"gbp":24,"usd":30},"monthly":{"eur":2.75,"gbp":2.5,"usd":3.0},"up_to":1},{"annual":{"eur":6,"gbp":6,"usd":9},"monthly":{"eur":0.5,"gbp":0.5,"usd":0.75}}],"unit":"repository","units":"repositories"}}};
  const API_BASE = CONFIG.domains.license_server;
  const WEBSITE = CONFIG.domains.website;
  const SUPPORTED = CONFIG.currencies.supported;
  const DEFAULT_CURRENCY = CONFIG.currencies.default;

  // -- Currency detection & formatting ----------------------------------------

  function detectCurrency(supported, fallback) {
    const saved = localStorage.getItem('cache_currency');
    if (saved && supported.includes(saved)) return saved;

    const langs = navigator.languages || [navigator.language || ''];
    const lang = langs.find(l => l.includes('-')) || langs[0] || '';
    const region = lang.split('-')[1]?.toUpperCase();

    const map = {
      US: 'usd', GB: 'gbp', UK: 'gbp',
      IE: 'eur', FR: 'eur', DE: 'eur', ES: 'eur', IT: 'eur',
      NL: 'eur', BE: 'eur', AT: 'eur', PT: 'eur', FI: 'eur', GR: 'eur',
      LU: 'eur', SK: 'eur', SI: 'eur', EE: 'eur', LV: 'eur', LT: 'eur',
      CY: 'eur', MT: 'eur', HR: 'eur',
    };
    const detected = map[region];
    if (detected && supported.includes(detected)) return detected;
    return fallback;
  }

  function formatPrice(amount, currency) {
    return new Intl.NumberFormat(undefined, {
      style: 'currency',
      currency: currency.toUpperCase(),
      currencyDisplay: 'narrowSymbol',
      minimumFractionDigits: amount % 1 === 0 ? 0 : 2,
    }).format(amount);
  }

  // -- Tier calculation -------------------------------------------------------

  function calculateTotal(tiers, quantity, currency, billing, pricingModel) {
    if (pricingModel === 'graduated') {
      // Graduated: each tier's rate applies only to units within that range
      let total = 0;
      let remaining = quantity;
      let prevUp = 0;
      for (const tier of tiers) {
        const tierEnd = tier.up_to !== undefined ? tier.up_to : Infinity;
        const count = Math.min(remaining, tierEnd - prevUp);
        total += count * tier[billing][currency];
        remaining -= count;
        prevUp = tierEnd;
        if (remaining <= 0) break;
      }
      return { total, unitPrice: total / quantity };
    }
    // Volume: all units charged at the rate of the matching tier
    let unitPrice = tiers[tiers.length - 1][billing][currency];
    for (const tier of tiers) {
      if (tier.up_to === undefined || quantity <= tier.up_to) {
        unitPrice = tier[billing][currency];
        break;
      }
    }
    return { total: quantity * unitPrice, unitPrice };
  }

  // -- State ------------------------------------------------------------------

  let activeCurrency;

  function getActivePlan() {
    return document.querySelector('input[name="plan"]:checked').value;
  }

  function getPlanConfig(planName) {
    return CONFIG.plans[planName];
  }

  function getQuantity() {
    return Math.max(1, parseInt(document.getElementById('quantity-input').value) || 1);
  }

  function getBilling() {
    return document.querySelector('input[name="billing"]:checked').value;
  }

  // -- UI updates -------------------------------------------------------------

  function updatePlanUI() {
    const plan = getActivePlan();
    const cfg = getPlanConfig(plan);
    const input = document.getElementById('quantity-input');
    const label = document.getElementById('quantity-label');

    label.textContent = 'Number of ' + cfg.units;
    input.min = cfg.min;
    input.max = cfg.max;
    // Reset to min if current value is out of range
    const current = parseInt(input.value) || 1;
    if (current < cfg.min || current > cfg.max) {
      input.value = cfg.min;
    }
  }

  function updatePlanPrices() {
    const c = activeCurrency;
    const pTier1 = CONFIG.plans.personal.tiers[0];
    document.getElementById('plan-price-personal').textContent =
      'from ' + formatPrice(pTier1.monthly[c], c) + '/month';

    const bTier1 = CONFIG.plans.business.tiers[0];
    document.getElementById('plan-price-business').textContent =
      'from ' + formatPrice(bTier1.monthly[c], c) + '/month/user';
  }

  function updateAnnualSavings() {
    const plan = getActivePlan();
    const cfg = getPlanConfig(plan);
    const quantity = getQuantity();
    const c = activeCurrency;

    const monthly = calculateTotal(cfg.tiers, quantity, c, 'monthly', cfg.pricing_model);
    const annual = calculateTotal(cfg.tiers, quantity, c, 'annual', cfg.pricing_model);
    const saving = Math.round((1 - annual.total / (monthly.total * 12)) * 100);

    const badge = document.getElementById('annual-savings-badge');
    badge.textContent = saving > 0 ? 'Save ' + saving + '%' : '';
  }

  function updatePriceSummary() {
    const plan = getActivePlan();
    const cfg = getPlanConfig(plan);
    const billing = getBilling();
    const quantity = getQuantity();
    const c = activeCurrency;

    const { total } = calculateTotal(cfg.tiers, quantity, c, billing, cfg.pricing_model);
    const el = document.getElementById('price-summary');
    const unitsLabel = quantity === 1 ? cfg.unit : cfg.units;
    let html = '';

    if (billing === 'monthly') {
      html = '<span class="price-amount">' + formatPrice(total, c) + '/month</span>';
      if (quantity > 1) {
        html += '<div class="price-detail">' + quantity + ' ' + unitsLabel + '</div>';
      }
    } else {
      const perMonth = total / 12;
      html = '<span class="price-amount">' + formatPrice(perMonth, c) + '/month</span>';
      let detail = formatPrice(total, c) + '/year';
      if (quantity > 1) {
        detail += ' &middot; ' + quantity + ' ' + unitsLabel;
      }
      html += '<div class="price-detail">' + detail + '</div>';
    }

    el.innerHTML = html;
  }

  function updateAll() {
    updatePlanPrices();
    updateAnnualSavings();
    updatePriceSummary();
  }

  // -- Currency picker --------------------------------------------------------

  const select = document.getElementById('currency-select');
  SUPPORTED.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = CONFIG.currencies[c].label;
    select.appendChild(opt);
  });

  // Resolve initial currency: query param > localStorage > auto-detect
  const params = new URLSearchParams(window.location.search);
  const paramCurrency = params.get('currency');
  if (paramCurrency && SUPPORTED.includes(paramCurrency)) {
    activeCurrency = paramCurrency;
    localStorage.setItem('cache_currency', paramCurrency);
  } else {
    activeCurrency = detectCurrency(SUPPORTED, DEFAULT_CURRENCY);
  }
  select.value = activeCurrency;

  select.addEventListener('change', () => {
    activeCurrency = select.value;
    localStorage.setItem('cache_currency', activeCurrency);
    updateAll();
  });

  // -- Pre-select plan from query param ---------------------------------------

  const paramPlan = params.get('plan');
  if (paramPlan === 'business' || paramPlan === 'personal') {
    const radio = document.querySelector('input[name="plan"][value="' + paramPlan + '"]');
    if (radio) radio.checked = true;
  }
  if (params.get('cancelled') === 'true') {
    document.getElementById('cancelled-banner').style.display = 'block';
  }

  // -- Event listeners --------------------------------------------------------

  document.querySelectorAll('input[name="plan"]').forEach(radio => {
    radio.addEventListener('change', () => { updatePlanUI(); updateAll(); });
  });
  document.querySelectorAll('input[name="billing"]').forEach(radio => {
    radio.addEventListener('change', () => { updateAnnualSavings(); updatePriceSummary(); });
  });
  document.getElementById('quantity-input').addEventListener('input', () => {
    updateAnnualSavings();
    updatePriceSummary();
  });

  // -- Init -------------------------------------------------------------------

  updatePlanUI();
  updateAll();

  // -- Checkout ---------------------------------------------------------------

  function resolveProductId() {
    const plan = getActivePlan();
    const cfg = getPlanConfig(plan);
    const billing = getBilling();
    return billing === 'monthly' ? cfg.monthly_id : cfg.annual_id;
  }

  async function handlePurchase() {
    const btn = document.getElementById('purchase-btn');
    const errorEl = document.getElementById('purchase-error');
    const loadingEl = document.getElementById('purchase-loading');

    btn.disabled = true;
    errorEl.style.display = 'none';
    loadingEl.style.display = 'block';

    const productId = resolveProductId();
    const quantity = getQuantity();

    try {
      const res = await fetch(API_BASE + '/checkout/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          product_id: productId,
          quantity: quantity,
          currency: activeCurrency,
          success_url: WEBSITE + '/license/manage/?session_id={CHECKOUT_SESSION_ID}',
          cancel_url: WEBSITE + '/license/purchase/?cancelled=true',
        }),
      });

      const json = await res.json();
      if (!res.ok) {
        throw new Error(json.error?.message || 'Checkout failed');
      }

      localStorage.setItem('cache_license_id', json.data.license_id);
      window.location.href = json.data.checkout_url;
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.style.display = 'block';
      loadingEl.style.display = 'none';
      btn.disabled = false;
    }
  }</script></main><footer class=footer><div class=footer-container><p class=footer-text>© 2026 Rocketware<nav class=footer-links><a class=footer-link href=/docs/>Docs</a><a class=footer-link href=/license/>License</a><a class=footer-link href=/docs/privacy-policy/>Privacy</a><a class=footer-link href=https://github.com/rocketware/cache rel=noopener target=_blank>GitHub</a></nav></div></footer><script>function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    }</script>
