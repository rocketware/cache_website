# Cache Website Configuration Data
# Product IDs, pricing, and server URLs for license management pages.

[domains]
website = "https://getcache.app"
license_server = "https://license.getcache.app"

# Currencies
[currencies]
default = "usd"
supported = ["usd", "gbp", "eur"]

[currencies.usd]
symbol = "$"
label = "USD"
position = "prefix"

[currencies.gbp]
symbol = "£"
label = "GBP"
position = "prefix"

[currencies.eur]
symbol = "€"
label = "EUR"
position = "prefix"

# Personal plan — volume pricing by repository count
[plans.personal]
display_name = "Personal"
tagline = "For individuals and families"
product_id = "prod_U0UhEwEmWvVOUh"
monthly_id = "price_1T2TiZHBjuEfyzFqUIizdtqw"
annual_id = "price_1T2TiZHBjuEfyzFqluNL5AOo"
unit = "repository"
units = "repositories"
min = 1
max = 20

