# Cache Website Configuration Data
# Product IDs, pricing, and server URLs for license management pages.

[domains]
website = "https://www.cachenotes.app"
license_server = "https://api.cachenotes.app"

# Currencies
[currencies]
default = "usd"
supported = ["usd", "gbp", "eur"]

[currencies.usd]
symbol = "$"
label = "USD"
position = "prefix"

[currencies.gbp]
symbol = "£"
label = "GBP"
position = "prefix"

[currencies.eur]
symbol = "€"
label = "EUR"
position = "prefix"

# Android APK signing certificate fingerprints (SHA-256)
[signing_keys.android]
rocketware = "e0fb26d760323772b247b4d35d342fb0ef409b17227cdbcaa843d39a24fa431e"
google_play = ""

# Personal plan — graduated pricing by repository count
# First repo at full price, each additional at a flat discount rate
[plans.personal]
display_name = "Personal"
tagline = "For individuals and families"
pricing_model = "graduated"
product_id = "prod_U0UhEwEmWvVOUh"
monthly_id = "price_1T2WuWHBjuEfyzFqERbpfJ23"
annual_id = "price_1T3GqyHBjuEfyzFqAjSSC3jU"
unit = "repository"
units = "repositories"
min = 1
max = 5

[[plans.personal.tiers]]
up_to = 1
monthly = { gbp = 2.50, usd = 3.00, eur = 2.75 }
annual = { gbp = 24, usd = 30, eur = 27 }

[[plans.personal.tiers]]
monthly = { gbp = 0.50, usd = 0.75, eur = 0.50 }
annual = { gbp = 6, usd = 9, eur = 6 }

# Business plan — graduated pricing by seat count
# Single shared repository per subscription. First 10 seats at full price,
# each additional at a flat discount rate.
# NOTE: Stripe prices need reconfiguring from volume to graduated model
[plans.business]
pricing_model = "graduated"
display_name = "Business"
tagline = "For teams and organisations"
product_id = "prod_U0UyX2cX4kl5gD"
monthly_id = "price_1T2TykHBjuEfyzFqA2RVNIvu"
annual_id = "price_1T3GvtHBjuEfyzFqnZXattf4"
unit = "seat"
units = "seats"
min = 1
max = 100

[[plans.business.tiers]]
up_to = 10
monthly = { gbp = 3.75, usd = 4.50, eur = 4.00 }
annual = { gbp = 36, usd = 45, eur = 40 }

[[plans.business.tiers]]
monthly = { gbp = 2.50, usd = 3.00, eur = 2.75 }
annual = { gbp = 24, usd = 30, eur = 27 }

# Founder plan — one-time lifetime purchase (limited availability)
[plans.founder]
display_name = "Founder"
tagline = "Lifetime license, limited availability"
pricing_model = "fixed"
price_id = "price_1TA8MFHBjuEfyzFqdtMRopvg"
repositories = 3

[plans.founder.price]
gbp = 100
usd = 130
eur = 120
